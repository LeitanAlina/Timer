<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <title>Таймер</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
<body>
    <div class="timer-container">

        <h2>Обратный отсчет</h2>

        <div class="controls">
            <input
                id="minutesInput"
                type="number"
                min="1"
                max="99"
                value="5"
                placeholder="Минуты">

            <button id="startBtn">
                Старт
            </button>

            <div id="spinner" class="spinner hidden"></div>
        </div>

        <div class="circle-box">

            <svg width="260" height="260">

                <circle
                    class="bg"
                    cx="130"
                    cy="130"
                    r="110">
                </circle>

                <circle
                    id="progressCircle"
                    class="progress"
                    cx="130"
                    cy="130"
                    r="110">
                </circle>

            </svg>

            <h1 id="timer">00:00</h1>

        </div>

    </div>

    <script src="script.js"></script>

</body>
</html>
